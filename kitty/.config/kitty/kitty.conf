include ./kitty-themes/00-Default.conf

font_family FantasqueSansM Nerd Font Mono Bold
font_size 12.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.9
dynamic_background_opacity 1
confirm_os_window_close 0

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 100000

# Allow kitty-scrollback.nvim to control kitty via remote API
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# kitty-scrollback.nvim kitten — renders ANSI colors correctly in nvim
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

selection_foreground none
selection_background none

foreground #dddddd
background #000000
cursor #dddddd

# ── Layouts (splits + zoom) ───────────────────────────────────────────────────
# "splits" enables tiling; "stack" is used for zoom (maximises one pane)
enabled_layouts splits, stack

# ── Tabs (≈ tmux windows) ─────────────────────────────────────────────────────
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_title_template "{index}: {title}"
active_tab_font_style bold

# ── Keybindings (backtick prefix, same as tmux) ───────────────────────────────
# grave = backtick (`). Press ` then the key, just like tmux.
# Note: typing a lone backtick has a brief delay while kitty waits for a chord.

# Splits
map grave>apostrophe  launch --location=vsplit --cwd=current
map grave>minus        launch --location=hsplit --cwd=current

# Pane navigation
map grave>h  neighboring_window left
map grave>j  neighboring_window down
map grave>k  neighboring_window up
map grave>l  neighboring_window right

# Pane resize
map grave>shift+h  resize_window narrower 5
map grave>shift+l  resize_window wider 5
map grave>shift+j  resize_window shorter 5
map grave>shift+k  resize_window taller 5

# Zoom current pane (toggle stack layout)
map grave>f  toggle_layout stack

# Kill pane
map grave>x  close_window

# Tab navigation (≈ tmux prefix+J / prefix+K)
map grave>shift+j  previous_tab
map grave>shift+k  next_tab

# New tab in current directory
map grave>n  launch --type=overlay --stdin-source=none kitty-new-tab

# Tab picker — interactive list (≈ tmux prefix+s session list)
map grave>s  launch --type=overlay --stdin-source=none kitty-tab-select

# Rename tab
map grave>comma  set_tab_title

# Reload config
map grave>period  load_config_file

# Scrollback / copy mode (≈ tmux prefix+esc or prefix+[)
# Opens kitty-scrollback.nvim: v/V visual select, y to yank, / search, q quit
map grave>escape  kitty_scrollback_nvim
map grave>slash   kitty_scrollback_nvim

# Copy/paste (these stay as ctrl+shift since they don't conflict)
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
