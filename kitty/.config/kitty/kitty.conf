include ./kitty-themes/00-Default.conf

font_family JetBrainsMono Nerd Font
# font_family Cascadia Code Bold
# font_family DejaVu Sans Mono Bold
font_size 12.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.9
dynamic_background_opacity 1
confirm_os_window_close -1

# Animated cursor
cursor_trail 1

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 100000

# Allow kitty-scrollback.nvim to control kitty via remote API
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# kitty-scrollback.nvim kitten — renders ANSI colors correctly in nvim
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

selection_foreground none
selection_background none

foreground #dddddd
background #000000
cursor #dddddd

# ── Layouts (splits + zoom) ───────────────────────────────────────────────────
# "splits" enables tiling; "stack" is used for zoom (maximises one pane)
enabled_layouts splits, stack

# ── Tabs (≈ tmux windows) ─────────────────────────────────────────────────────
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_title_template "{index}: {title}"
active_tab_font_style bold

# ── Keybindings (ctrl+a prefix) ───────────────────────────────────────────────
# Press ctrl+a then ctrl+<key>. Ctrl modifier on both keys avoids IME interference.

# Pass ctrl+a through to remote tmux (press ctrl+a twice)
map ctrl+a>ctrl+a send_key ctrl+a

# Splits
map ctrl+a>apostrophe  launch --location=vsplit --cwd=current
map ctrl+a>minus        launch --location=hsplit --cwd=current

# Tab cycling
map ctrl+a>ctrl+j  previous_tab
map ctrl+a>ctrl+k  next_tab

# Pane resize
map ctrl+a>ctrl+shift+h  resize_window narrower 5
map ctrl+a>ctrl+shift+l  resize_window wider 5
map ctrl+a>ctrl+shift+j  resize_window shorter 5
map ctrl+a>ctrl+shift+k  resize_window taller 5

# Zoom current pane (toggle stack layout)
map ctrl+a>ctrl+f  toggle_layout stack

# Kill pane
map ctrl+a>ctrl+x  close_window

# Tab navigation (≈ tmux prefix+J / prefix+K)
map ctrl+a>ctrl+shift+j  previous_tab
map ctrl+a>ctrl+shift+k  next_tab

# New tab in current directory
map ctrl+a>ctrl+n  launch --type=overlay --stdin-source=none kitty-new-tab

# Tab picker — interactive list (≈ tmux prefix+s session list)
map ctrl+a>ctrl+s  launch --type=overlay --stdin-source=none kitty-tab-select

# Switch to last active tab (Alt-Tab behavior)
map ctrl+a>ctrl+l  launch --type=overlay --stdin-source=none kitty-last-tab

# Pane navigation
map ctrl+a>h  neighboring_window left
map ctrl+a>j  neighboring_window down
map ctrl+a>k  neighboring_window up
map ctrl+a>l  neighboring_window right

# Rename tab
map ctrl+a>comma  set_tab_title

# Reload config
map ctrl+a>period  load_config_file

# Scrollback / copy mode (≈ tmux prefix+esc or prefix+[)
# Opens kitty-scrollback.nvim: v/V visual select, y to yank, / search, q quit
map ctrl+a>escape  combine : launch --type=background fcitx5-remote -c : kitty_scrollback_nvim
map ctrl+a>slash   combine : launch --type=background fcitx5-remote -c : kitty_scrollback_nvim

# Copy/paste (these stay as ctrl+shift since they don't conflict)
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
