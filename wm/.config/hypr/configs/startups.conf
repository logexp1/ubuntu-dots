# exec-once = kime
exec-once = fcitx5
exec-once = emacsclient -e 0 &> /tmp/emacs_daemon.log
exec-once = udiskie
# exec-once = pypr --debug /tmp/pypr.log
exec-once = pypr --debug /tmp/pypr.log
exec-once = hyprland-autoname-workspaces --migrate-config
exec-once = waybar
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent
# exec-once = swayidle -w timeout 600 'swaylock -f' timeout 900 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'
exec-once = hypridle
exec-once = swww query || (swww init && randwall)
exec-once = swaync
exec-once = dropbox start
exec-once = onedrive --monitor --verbose &> ~/onedrive.log
exec-once = hyprpm reload
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
