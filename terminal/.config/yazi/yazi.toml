[mgr]
show_hidden = true
linemode = "mtime"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Edit in nvim" },
]
browse = [
  { run = 'firefox "$@"', orphan = true, desc = "Open in Firefox" },
]
play-video = [
  { run = 'mpv --save-position-on-quit "$@"', orphan = true, desc = "Play with mpv" },
]
play-audio = [
  { run = 'mpv --no-video --osd-level=3 "$@"', orphan = true, desc = "Play with mpv" },
]
view-image = [
  { run = 'imv "$@"', orphan = true, desc = "View with imv" },
]
view-pdf = [
  { run = 'zathura "$@"', orphan = true, desc = "View with zathura" },
]
open-doc = [
  { run = 'flatpak run org.libreoffice.LibreOffice "$@"', orphan = true, desc = "Open with LibreOffice" },
]
extract = [
  { run = 'atool -l "$@"', block = true, desc = "List archive" },
]
torrent = [
  { run = 'transmission-remote --add "$@"', orphan = true, desc = "Add to Transmission" },
]
gimp = [
  { run = 'gimp "$@"', orphan = true, desc = "Open in GIMP" },
]

[open]
rules = [
  # Web
  { mime = "text/html",                    use = "browse" },
  # Images
  { name = "*.xcf",                        use = "gimp" },
  { mime = "image/*",                      use = "view-image" },
  # Video
  { mime = "video/*",                      use = "play-video" },
  # Audio
  { mime = "audio/*",                      use = "play-audio" },
  { mime = "application/ogg",              use = "play-audio" },
  # Documents
  { mime = "application/pdf",              use = "view-pdf" },
  { name = "*.{pptx,docx,xlsx,odt,ods,odp,ppt,doc,xls}", use = "open-doc" },
  # Archives / comics
  { name = "*.{cbz,cbr}",                 use = "view-image" },
  { mime = "application/zip",              use = "extract" },
  { mime = "application/x-tar",           use = "extract" },
  { mime = "application/x-rar",           use = "extract" },
  { mime = "application/x-7z-compressed", use = "extract" },
  { mime = "application/java-archive",    use = "extract" },
  # Torrents
  { name = "*.torrent",                   use = "torrent" },
  { mime = "application/x-bittorrent",    use = "torrent" },
  # Text / code (fallback)
  { mime = "text/*",                       use = "edit" },
  { mime = "application/json",             use = "edit" },
  { mime = "application/xml",              use = "edit" },
  # Final fallback
  { name = "*",                            use = "edit" },
]