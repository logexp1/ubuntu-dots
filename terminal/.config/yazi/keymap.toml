[input]
prepend_keymap = [
  { on = ["<Esc>"], run = "close", desc = "Cancel and close input" },
  { on = ["<C-c>"], run = "close", desc = "Cancel and close input" },
]

[mgr]
prepend_keymap = [
  { on = ["l"], run = "plugin smart-enter", desc = "Enter directory or open file" },

  # Open / drag-and-drop
  { on = ["<Enter>"], run = "shell --orphan 'xdg-open \"$1\"'", desc = "Open with system app" },
  { on = ["<C-d>"], run = "shell 'dragon-drop -a -x $@'", desc = "Dragon drag and drop" },

  # Git
  { on = ["C"], run = "shell --block 'read -p \"Clone URL: \" url && git clone \"$url\"'", desc = "Git clone" },

  # Selection
  { on = ["m"], run = ["toggle", "arrow next"], desc = "Toggle mark" },
  { on = ["M"], run = "escape --select", desc = "Unmark all" },

  # File operations
  { on = ["c", "d"], run = "create", desc = "Create file/directory" },
  { on = ["c", "c"], run = "rename", desc = "Rename file" },
  { on = ["c", "m"], run = "plugin chmod", desc = "Change permissions" },
  { on = ["c", "o"], run = "shell --block 'read -p \"New owner: \" o && chown \"$o\" \"$@\"'", desc = "Change owner" },
  { on = ["c", "g"], run = "shell --block 'read -p \"New group: \" g && chgrp \"$g\" \"$@\"'", desc = "Change group" },
  { on = ["D"], run = "remove --permanently", desc = "Delete permanently" },

  # Clipboard
  { on = ["Y"], run = "shell 'echo -n \"$PWD\" | wl-copy'", desc = "Copy current directory path" },

  # Tab navigation
  { on = ["J"], run = "tab_switch 1 --relative", desc = "Switch to next tab" },
  { on = ["K"], run = "tab_switch -1 --relative", desc = "Switch to prev tab" },

  # Bookmarks
  { on = ["'", "/"], run = "cd /", desc = "Bookmark: root" },
  { on = ["'", "b"], run = "cd /bin", desc = "Bookmark: /bin" },
  { on = ["'", "t"], run = "cd /tmp", desc = "Bookmark: /tmp" },
  { on = ["'", "s"], run = "cd ~/src", desc = "Bookmark: ~/src" },
  { on = ["'", "h"], run = "cd ~", desc = "Bookmark: home" },
  { on = ["'", "d"], run = "cd ~/Downloads", desc = "Bookmark: Downloads" },
  { on = ["'", "e"], run = "cd ~/.config/nvim", desc = "Bookmark: nvim config" },
  { on = ["'", "p"], run = "cd ~/Pictures/Screenshots", desc = "Bookmark: Screenshots" },
]
